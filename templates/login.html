<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{url_for('static', filename='css/login.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename='css/general.css')}}">
</head>

<body class="bg-body-tertiary">

    <div class="container">
        <div class="row vh-100 justify-content-center align-items-center">

            <div class="col-11 col-sm-8 col-md-6 col-lg-4">

                <div class="card shadow-lg border-0 rounded-4">

                    <div class="card-body p-5">

                        <h2 class="text-center fw-bold mb-2">
                            Bienvenido
                        </h2>

                        <p class="text-center text-secondary mb-4">
                            Inicia sesión para continuar
                        </p>

                        <form id="form-login">

                            <div class="mb-3">
                                <label class="form-label">Usuario</label>
                                <input type="text" id="input-usuario" class="form-control"
                                    placeholder="Ingresa tu usuario">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="input-contrasena" class="form-control"
                                    placeholder="********">
                            </div>

                            <div class="d-grid">
                                <button type="submit" id="btn-iniciar-sesion" class="btn btn-primary btn-lg">
                                    Iniciar Sesión
                                </button>
                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>
    </div>

    <div id="contenedor-toasts" class="contenedor-toasts">
        {% include 'components/toast.html' %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="{{ url_for('static', filename='js/pages/login.js') }}"></script>

</body>

</html>
