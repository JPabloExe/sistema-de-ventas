<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema{% endblock %}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/general.css') }}">

    <!-- CSS POR VISTA -->
    {% block css %}{% endblock %}
</head>

<body>

    <!-- BOTON SIDEBAR -->
    {% include 'components/boton-sidebar.html' %}

    <!-- SIDEBAR GLOBAL -->
    {% include 'components/sidebar.html' %}

    <!-- DIALOG ELIMINAR -->
    {% include 'components/dialog-eliminar.html' %}

    <!-- CONTENIDO DINÁMICO -->
    
    {% block contenido %}{% endblock %}
    
    <!-- TOAST GLOBAL -->
    <div id="contenedor-toasts" class="contenedor-toasts">
        {% include 'components/toast.html' %}
    </div>

    <!-- JS POR VISTA -->
    {% block js %}{% endblock %}

</body>
</html>
