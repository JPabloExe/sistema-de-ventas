{% extends 'base.html' %}

{% block title %}Ventas{% endblock %}

{% block css %}
<link rel="stylesheet" href="{{url_for('static', filename='css/ventas.css')}}">
{% endblock %}

{% block contenido %}

<div class="contenedor" id="contenedor">
    <header class="header">
        <div class="div-presentacion">
            <h2 id="lbl-saludo">Gestion de Ventas</h2>
            <p id="lbl-texto">Consulta y administra todas tus ventas</p>
        </div>
    </header>


    <div class="operaciones">

        <div class="fechas">
            <div class="div-fecha-inicial">
                <p>FECHA INICIAL</p>
                <input id="input-fecha-inicial" class="input-fecha-inicial" type="date">
            </div>
            
            <div class="div-fecha-final">
                <p>FECHA FINAL</p>
                <input id="input-fecha-final" class="input-fecha-final" type="date">
            </div>

            <button id="btn-buscar">
                <i class="fa-solid fa-magnifying-glass"></i>
                Buscar
            </button>
        </div>


        <button id="btn-actualizar-pagina">
            <i class="fa-solid fa-arrows-rotate"></i>
            Actualizar
        </button>
    </div>


    <table class="tabla-ventas">
        <thead>
            <tr>
                <th>NUMERO</th>
                <th>FECHA</th>
                <th>USUARIO</th>
                <th>ITEMS</th>
                <th>METODO</th>
                <th>TOTAL</th>
                <th>ACCIONES</th>
            </tr>
        </thead>

        <tbody id="cuerpo-tabla-ventas"> </tbody>
    </table>
</div>

{% endblock %}

{% block js %}
<script type="module" src="{{ url_for('static', filename='js/pages/ventas.js') }}"></script>
{% endblock %}
